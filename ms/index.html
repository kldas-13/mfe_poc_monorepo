  ║  bpmn-canvas-mfe    :5175   qiankun remote entry        ║

  ║  QUICK START                                             ║
  ║  ─────────────────────────────────────────────────────  ║
  ║  1. Start all other repos (npm run dev in each)         ║
  ║  2. npm install && npm run dev                          ║
